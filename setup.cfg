[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    env,
    build,
    dist,
    *.egg-info
extend-ignore =
    E203,
    W503,
    E501

[coverage:run]
source = authentication
omit =
    */migrations/*
    */tests/*
    */settings*.py
    manage.py
    manage_prod.py

[coverage:report]
show_missing = true
skip_covered = false
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
