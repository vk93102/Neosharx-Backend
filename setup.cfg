[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    env,
    build,
    dist,
    *.egg-info,
    authentication,
    NFA_Football,
    create_set,
    NBA,
    check_db_integrity.py,
    add_*.py,
    create_*.py,
    fix_*.py,
    migrate_with_debug.py,
    verify_*.py,
    test_admin*.py,
    test_all_endpoints.sh
extend-ignore =
    E203,
    W503,
    W291,
    W293,
    W292
per-file-ignores =
    authentication/views.py: W291,W293,W292,E501
    backend/settings*.py: E501,E402
    tests/conftest.py: E302
    tests/check_db_integrity.py: F401,E302,E305

[coverage:run]
source = authentication
omit =
    */migrations/*
    */tests/*
    */settings*.py
    manage.py
    manage_prod.py

[coverage:report]
show_missing = true
skip_covered = false
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
