# =============================================================================
# docker-compose.prod.yml — NeoSharX Backend (Production Stack)
#
# Services:
#   db      → PostgreSQL 16 with persistent volume
#   redis   → Redis 7
#   web     → Gunicorn (production WSGI server)
#   nginx   → Reverse proxy, static files, SSL termination
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml exec web python manage.py createsuperuser
#   docker compose -f docker-compose.prod.yml logs -f web
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: neosharx_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neosharx_prod}
      POSTGRES_USER: ${POSTGRES_USER:-neosharx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Required — no default in prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neosharx_user} -d ${POSTGRES_DB:-neosharx_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: neosharx_redis_prod
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_prod_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Django — Gunicorn
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: neosharx-backend:${IMAGE_TAG:-latest}
    container_name: neosharx_web_prod
    restart: always
    command: scripts/start.sh
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neosharx_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-neosharx_prod}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      DJANGO_SETTINGS_MODULE: backend.settings
    volumes:
      - static_prod:/app/staticfiles
      - media_prod:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy & Static File Server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.26-alpine
    container_name: neosharx_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_prod:/app/staticfiles:ro
      - media_prod:/app/media:ro
      - nginx_logs:/var/log/nginx
      # Mount SSL certs (provided externally, e.g. Certbot)
      - ${SSL_CERT_PATH:-./nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - external
      - internal

volumes:
  postgres_prod_data:
    name: neosharx_postgres_prod
  redis_prod_data:
    name: neosharx_redis_prod
  static_prod:
    name: neosharx_static_prod
  media_prod:
    name: neosharx_media_prod
  nginx_logs:
    name: neosharx_nginx_logs

networks:
  internal:
    name: neosharx_internal
    internal: true
  external:
    name: neosharx_external
