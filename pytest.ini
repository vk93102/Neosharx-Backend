[pytest]
# ---------------------------------------------------------------------------
# Django settings
# ---------------------------------------------------------------------------
DJANGO_SETTINGS_MODULE = backend.settings
pythonpath = .

# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Output & verbosity
# ---------------------------------------------------------------------------
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -p no:warnings
    --color=yes

# ---------------------------------------------------------------------------
# Markers
# ---------------------------------------------------------------------------
markers =
    unit: Pure unit tests — no database or network access
    integration: Integration tests — uses database, no external services
    e2e: End-to-end API tests — full request/response cycle
    slow: Tests that take more than 2 seconds
    sports: Tests specifically for sports event data (NFL, NBA, Football)
    auth: Authentication-related tests
    models: Model-level tests
    api: API endpoint tests
