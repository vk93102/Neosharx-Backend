# =============================================================================
# nginx/conf.d/neosharx.conf — NeoSharX Backend virtual host
#
# HTTP  → redirects to HTTPS
# HTTPS → proxies to Gunicorn, serves static/media directly
#
# Replace YOUR_DOMAIN with your actual domain before deploying.
# SSL certificates are expected at /etc/nginx/certs/
# =============================================================================

# Upstream — Gunicorn on the web container
upstream django_app {
    server web:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main application server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL certificates (managed externally via Certbot / Let's Encrypt)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Strong SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ---------------------------------------------------------------------------
    # Static files (served directly by Nginx — bypass Django entirely)
    # ---------------------------------------------------------------------------
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # API & Django application
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass         http://django_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }

    # Health check (bypasses proxy auth if any)
    location /healthz/ {
        proxy_pass http://django_app/healthz/;
        access_log off;
    }
}
