# =============================================================================
# .github/workflows/ci.yml
# NeoSharX Backend — Continuous Integration Pipeline
#
# Triggers:
#   • Every push to main / develop / feature/* branches
#   • Every pull request targeting main or develop
#
# Jobs:
#   lint       → Flake8 code style & import checks
#   test       → pytest (unit + integration + E2E) with coverage report
#   security   → Safety vulnerability scan of dependencies
#   build      → Verifies the Django app starts without errors
# =============================================================================

name: CI — NeoSharX Backend

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs on the same branch (saves Actions minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: backend.settings

# =============================================================================
# Job 1 — Lint
# =============================================================================
jobs:
  lint:
    name: "🔍 Lint (flake8)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 authentication/ backend/ tests/ \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,.venv \
            --extend-ignore=E203,W503

# =============================================================================
# Job 2 — Test (pytest + coverage)
# =============================================================================
  test:
    name: "🧪 Tests (pytest + coverage)"
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Safe test-only environment — no real external services
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      DATABASE_URL: ""          # Forces SQLite :memory: in settings.py
      TWILIO_ACCOUNT_SID: "ACtest000000000000000000000000000000"
      TWILIO_AUTH_TOKEN: "test_token_000000000000000000000000"
      TWILIO_VERIFY_SERVICE_SID: "VAtest000000000000000000000000000000"
      USE_MOCK_OTP: "true"
      MOCK_OTP_CODE: "123456"
      LINKEDIN_CLIENT_ID: "ci_linkedin_client_id"
      LINKEDIN_CLIENT_SECRET: "ci_linkedin_client_secret"
      LINKEDIN_REDIRECT_URI: "http://localhost:8000/auth/linkedin/callback.html"
      GOOGLE_CLIENT_ID: "ci_google_client_id"
      GOOGLE_CLIENT_SECRET: "ci_google_client_secret"
      GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback.html"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov pytest-xdist coverage

      - name: Create minimal .env for CI
        run: |
          cat > .env << 'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1,testserver
          DATABASE_URL=
          TWILIO_ACCOUNT_SID=ACtest000000000000000000000000000000
          TWILIO_AUTH_TOKEN=test_token_000000000000000000000000
          TWILIO_VERIFY_SERVICE_SID=VAtest000000000000000000000000000000
          USE_MOCK_OTP=True
          MOCK_OTP_CODE=123456
          LINKEDIN_CLIENT_ID=ci_linkedin_client_id
          LINKEDIN_CLIENT_SECRET=ci_linkedin_client_secret
          LINKEDIN_REDIRECT_URI=http://localhost:8000/auth/linkedin/callback.html
          GOOGLE_CLIENT_ID=ci_google_client_id
          GOOGLE_CLIENT_SECRET=ci_google_client_secret
          GOOGLE_REDIRECT_URI=http://localhost:8000/auth/google/callback.html
          EOF

      - name: Run Django system checks
        run: python manage.py check --deploy 2>/dev/null || python manage.py check

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --cov=authentication \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=60 \
            -v \
            --tb=short \
            -n auto

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          name: neosharx-backend-coverage
          fail_ci_if_error: false

      - name: Upload HTML coverage as artifact
        uses: actions/upload-artifact@v4
        if: always() && matrix.python-version == '3.11'
        with:
          name: coverage-html-report
          path: htmlcov/
          retention-days: 14

      - name: Upload test results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            .pytest_cache/
          retention-days: 7

# =============================================================================
# Job 3 — Security scan
# =============================================================================
  security:
    name: "🔒 Security (Safety)"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true   # Don't fail the entire pipeline on advisory-only issues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Safety
        run: pip install safety

      - name: Scan dependencies for vulnerabilities
        run: safety check -r requirements.txt --output text || true

# =============================================================================
# Job 4 — Build / Startup verification
# =============================================================================
  build:
    name: "🏗️ Build check"
    runs-on: ubuntu-latest
    needs: test

    env:
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: ""
      TWILIO_ACCOUNT_SID: "ACtest000000000000000000000000000000"
      TWILIO_AUTH_TOKEN: "test_token_000000000000000000000000"
      TWILIO_VERIFY_SERVICE_SID: "VAtest000000000000000000000000000000"
      USE_MOCK_OTP: "true"
      MOCK_OTP_CODE: "123456"
      LINKEDIN_CLIENT_ID: "ci_linkedin_client_id"
      LINKEDIN_CLIENT_SECRET: "ci_linkedin_client_secret"
      LINKEDIN_REDIRECT_URI: "http://localhost:8000/auth/linkedin/callback.html"
      GOOGLE_CLIENT_ID: "ci_google_client_id"
      GOOGLE_CLIENT_SECRET: "ci_google_client_secret"
      GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback.html"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DATABASE_URL=
          TWILIO_ACCOUNT_SID=ACtest000000000000000000000000000000
          TWILIO_AUTH_TOKEN=test_token_000000000000000000000000
          TWILIO_VERIFY_SERVICE_SID=VAtest000000000000000000000000000000
          USE_MOCK_OTP=True
          MOCK_OTP_CODE=123456
          LINKEDIN_CLIENT_ID=ci_linkedin_client_id
          LINKEDIN_CLIENT_SECRET=ci_linkedin_client_secret
          LINKEDIN_REDIRECT_URI=http://localhost:8000/auth/linkedin/callback.html
          GOOGLE_CLIENT_ID=ci_google_client_id
          GOOGLE_CLIENT_SECRET=ci_google_client_secret
          GOOGLE_REDIRECT_URI=http://localhost:8000/auth/google/callback.html
          EOF

      - name: Django system check
        run: python manage.py check

      - name: Collect static files
        run: python manage.py collectstatic --noinput 2>/dev/null || echo "No static files configured"

      - name: Verify gunicorn can import the app
        run: |
          python -c "
          import django
          import os
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'backend.settings')
          django.setup()
          print('✅ Django app loaded successfully')
          "
