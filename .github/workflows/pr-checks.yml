# =============================================================================
# .github/workflows/pr-checks.yml
# NeoSharX Backend — Pull Request Quality Gate
#
# Runs fast, targeted checks on every PR to give quick feedback:
#   • Lint check
#   • Security advisory scan
#   • Unit + model tests only (fast subset)
#   • Test count summary comment posted to the PR
# =============================================================================

name: PR Quality Gate

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SECRET_KEY: "pr-test-secret-key"
  DEBUG: "true"
  ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
  DATABASE_URL: ""
  TWILIO_ACCOUNT_SID: "ACtest000000000000000000000000000000"
  TWILIO_AUTH_TOKEN: "test_token_000000000000000000000000"
  TWILIO_VERIFY_SERVICE_SID: "VAtest000000000000000000000000000000"
  USE_MOCK_OTP: "true"
  MOCK_OTP_CODE: "123456"
  LINKEDIN_CLIENT_ID: "ci_linkedin_client_id"
  LINKEDIN_CLIENT_SECRET: "ci_linkedin_client_secret"
  LINKEDIN_REDIRECT_URI: "http://localhost:8000/auth/linkedin/callback.html"
  GOOGLE_CLIENT_ID: "ci_google_client_id"
  GOOGLE_CLIENT_SECRET: "ci_google_client_secret"
  GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback.html"

jobs:
  pr-lint:
    name: "🔍 PR Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install flake8
      - run: |
          flake8 backend tests \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,.venv \
            --extend-ignore=E203,W503,W291,W293,W292 \
            --per-file-ignores="backend/settings*.py:E501,E402 tests/check_db_integrity.py:F401,E302,E305"

  pr-tests:
    name: "🧪 PR Tests (fast subset)"
    runs-on: ubuntu-latest
    needs: pr-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          SECRET_KEY=pr-test-secret-key
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1,testserver
          DATABASE_URL=
          TWILIO_ACCOUNT_SID=ACtest000000000000000000000000000000
          TWILIO_AUTH_TOKEN=test_token_000000000000000000000000
          TWILIO_VERIFY_SERVICE_SID=VAtest000000000000000000000000000000
          USE_MOCK_OTP=True
          MOCK_OTP_CODE=123456
          LINKEDIN_CLIENT_ID=ci_linkedin_client_id
          LINKEDIN_CLIENT_SECRET=ci_linkedin_client_secret
          LINKEDIN_REDIRECT_URI=http://localhost:8000/auth/linkedin/callback.html
          GOOGLE_CLIENT_ID=ci_google_client_id
          GOOGLE_CLIENT_SECRET=ci_google_client_secret
          GOOGLE_REDIRECT_URI=http://localhost:8000/auth/google/callback.html
          EOF

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests (models + sports events — fast subset)
        run: |
          pytest tests/test_models.py tests/test_sports_events.py \
            --cov=authentication \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v --tb=short

      - name: Post coverage summary as PR comment
        uses: MishaKav/pytest-coverage-comment@main
        if: always()
        continue-on-error: true
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: "📊 Test Coverage Report"
          badge-title: "Coverage"
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
