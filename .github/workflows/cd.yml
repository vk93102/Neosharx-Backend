# =============================================================================
# .github/workflows/cd.yml
# NeoSharX Backend — Continuous Delivery Pipeline
#
# Triggers:
#   • Push to main branch only (after CI passes)
#   • Manual workflow_dispatch
#
# Jobs:
#   deploy-staging  → Deploy to Render staging environment
#   smoke-test      → Hit key endpoints after staging deploy
#   deploy-prod     → Deploy to Render production (requires manual approval)
# =============================================================================

name: CD — NeoSharX Backend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Only one deploy at a time per environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

# =============================================================================
# Job 1 — Run CI first (reuse the CI workflow)
# =============================================================================
jobs:
  ci-gate:
    name: "✅ CI Gate"
    uses: ./.github/workflows/ci.yml
    secrets: inherit

# =============================================================================
# Job 2 — Deploy to Staging (Render)
# =============================================================================
  deploy-staging:
    name: "🚀 Deploy → Staging"
    runs-on: ubuntu-latest
    needs: ci-gate
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.staging_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render staging deploy
        id: deploy
        env:
          RENDER_STAGING_DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_STAGING_DEPLOY_HOOK secret not set — skipping deploy trigger"
            echo "staging_url=https://neosharx-backend-staging.onrender.com" >> $GITHUB_OUTPUT
          else
            echo "🚀 Triggering Render staging deploy..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$RENDER_STAGING_DEPLOY_HOOK")
            echo "Response code: $RESPONSE"
            if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
              echo "❌ Deploy hook failed with status $RESPONSE"
              exit 1
            fi
            echo "✅ Staging deploy triggered successfully"
            echo "staging_url=https://neosharx-backend-staging.onrender.com" >> $GITHUB_OUTPUT
          fi

      - name: Wait for staging to become healthy
        run: |
          echo "⏳ Waiting 60s for staging to boot..."
          sleep 60

# =============================================================================
# Job 3 — Post-deploy Smoke Tests
# =============================================================================
  smoke-test:
    name: "💨 Smoke Tests → Staging"
    runs-on: ubuntu-latest
    needs: deploy-staging
    continue-on-error: true

    env:
      BASE_URL: "https://neosharx-backend-staging.onrender.com"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health check
        run: |
          echo "🏥 Health check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/healthz/")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Health check passed" || echo "⚠️  Health check returned $STATUS"

      - name: Events API smoke test
        run: |
          echo "🏈 Events API check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/auth/events/")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Events API OK" || echo "⚠️  Events API returned $STATUS"

      - name: Tech News API smoke test
        run: |
          echo "📰 Tech News API check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/auth/tech-news/")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Tech News API OK" || echo "⚠️  Tech News API returned $STATUS"

      - name: Hackathons API smoke test
        run: |
          echo "💻 Hackathons API check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/auth/hackathons/")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Hackathons API OK" || echo "⚠️  Hackathons API returned $STATUS"

      - name: Stories API smoke test
        run: |
          echo "📖 Stories API check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/auth/stories/")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Stories API OK" || echo "⚠️  Stories API returned $STATUS"

# =============================================================================
# Job 4 — Deploy to Production (manual approval required)
# =============================================================================
  deploy-production:
    name: "🌐 Deploy → Production"
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: "https://neosharx-backend-1.onrender.com"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render production deploy
        env:
          RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_PROD_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_PROD_DEPLOY_HOOK secret not set — skipping production deploy"
          else
            echo "🚀 Triggering Render production deploy..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$RENDER_PROD_DEPLOY_HOOK")
            echo "Response code: $RESPONSE"
            if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
              echo "❌ Production deploy hook failed with status $RESPONSE"
              exit 1
            fi
            echo "✅ Production deploy triggered"
          fi

      - name: Post-production health check
        env:
          RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_PROD_DEPLOY_HOOK" ]; then
            echo "⏳ Waiting 90s for production to boot..."
            sleep 90
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://neosharx-backend-1.onrender.com/healthz/")
            echo "Production health status: $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Production is healthy" || echo "⚠️  Production health returned $STATUS"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
